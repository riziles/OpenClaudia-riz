version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    ignore:
      # GHSA-cq8v-f236-94qc / RUSTSEC-2026-0097 covers `rand::rng()`
      # unsoundness when a custom logger reseeds ThreadRng. The RustSec
      # advisory lists three separately-patched ranges:
      #
      #   patched = [">= 0.10.1", "< 0.10.0, >= 0.9.3", "< 0.9.0, >= 0.8.6"]
      #
      # i.e. the fix landed in 0.8.6, 0.9.3, and 0.10.1. This repo's
      # `Cargo.lock` contains rand 0.8.6 (transitive via the unused
      # ratatui-termwiz backend), 0.9.4, and 0.10.1 — ALL of which fall
      # within a patched range, so we are not actually vulnerable.
      # GitHub's Advisory Database does not honour the split-range
      # patching and reports any 0.9.x as vulnerable; suppress here to
      # silence the false positive. `cargo audit` honours the split
      # ranges and reports zero vulnerabilities for rand.
      - dependency-name: rand
        versions: ["< 0.11"]

  - package-ecosystem: cargo
    directory: /fuzz
    schedule:
      interval: weekly
    ignore:
      - dependency-name: rand
        versions: ["< 0.11"]
